name: Update NYT Book Reviews

on:
  schedule:
    - cron: '0 17 * * *'  # Noon ET (17:00 UTC = noon EST)
  workflow_dispatch: {}     # Manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and build
        run: python build.py

      - name: Send email notifications
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SUBSCRIBERS: ${{ secrets.SUBSCRIBERS }}
        run: python email_notify.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/reviews.json data/new_reviews.json docs/
          git diff --staged --quiet || git commit -m "Update reviews $(date -u +%Y-%m-%d)"
          git push
